app:
  host: "0.0.0.0"
  port: 8000
  title: "AutoTrack AI Multi-Object Tracking System"

model:
  yolo_path: "models/yolov8n.pt"
  confidence_threshold: 0.4
  classes:
    - 0  # person
    - 2  # car
    - 3  # motorcycle
    - 5  # bus
    - 7  # truck

tracking:
  max_age: 30
  n_init: 3
  nn_budget: 100

processing:
  frame_skip: 2
  target_width: 640
  target_height: 480
